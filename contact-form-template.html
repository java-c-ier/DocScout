<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Contact Message — DocScout</title>
  <style>
    @media only screen and (max-width: 600px) {
      .email-wrapper { padding: 16px 0 !important; }
      .email-card { width: 100% !important; }
      .email-header { padding: 28px 24px !important; }
      .email-header h1 { font-size: 30px !important; }
      .email-body { padding: 24px !important; }
      .email-footer { padding: 20px 24px !important; }
      .field-block { padding: 14px 16px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" class="email-wrapper" style="background-color:#f4f4f5;padding:40px 0;">
    <tr>
      <td align="center" style="padding:0 16px;">
        <table width="100%" cellpadding="0" cellspacing="0" class="email-card" style="max-width:580px;background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td class="email-header" style="background:linear-gradient(135deg,#1a8efd 0%,#0066cc 100%);padding:36px 40px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:38px;font-weight:700;letter-spacing:1px;">DocScout</h1>
              <p style="margin:8px 0 0;color:#cce4ff;font-size:13px;letter-spacing:2px;text-transform:uppercase;">New Contact Message</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td class="email-body" style="padding:40px;">
              <p style="margin:0 0 24px;color:#374151;font-size:15px;line-height:1.6;text-align:center;">
                You received a new message from the DocScout.
              </p>

              <!-- Name -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:16px;">
                <tr>
                  <td class="field-block" style="background-color:#f0f7ff;border-left:4px solid #1a8efd;border-radius:0 8px 8px 0;padding:16px 20px;">
                    <p style="margin:0 0 4px;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:600;">Name</p>
                    <p style="margin:0;color:#111827;font-size:16px;font-weight:600;">{{first-name}} {{last-name}}</p>
                  </td>
                </tr>
              </table>

              <!-- Email -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:16px;">
                <tr>
                  <td class="field-block" style="background-color:#f0f7ff;border-left:4px solid #1a8efd;border-radius:0 8px 8px 0;padding:16px 20px;">
                    <p style="margin:0 0 4px;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:600;">Email</p>
                    <p style="margin:0;color:#111827;font-size:16px;font-weight:600;word-break:break-all;">{{email}}</p>
                  </td>
                </tr>
              </table>

              <!-- Phone -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:16px;">
                <tr>
                  <td class="field-block" style="background-color:#f0f7ff;border-left:4px solid #1a8efd;border-radius:0 8px 8px 0;padding:16px 20px;">
                    <p style="margin:0 0 4px;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:600;">Phone</p>
                    <p style="margin:0;color:#111827;font-size:16px;font-weight:600;">+91 {{phone}}</p>
                  </td>
                </tr>
              </table>

              <!-- Message -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:8px;">
                <tr>
                  <td class="field-block" style="background-color:#f0f7ff;border-left:4px solid #1a8efd;border-radius:0 8px 8px 0;padding:16px 20px;">
                    <p style="margin:0 0 10px;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:600;">Message</p>
                    <p style="margin:0;color:#374151;font-size:15px;line-height:1.7;white-space:pre-wrap;word-break:break-word;">{{message}}</p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td class="email-footer" style="background-color:#f9fafb;padding:24px 40px;text-align:center;border-top:1px solid #e5e7eb;">
              <p style="margin:0;color:#9ca3af;font-size:12px;">
                Sent from the DocScout Contact Form
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
